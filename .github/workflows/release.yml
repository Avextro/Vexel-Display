name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install vcpkg dependencies
        run: |
          vcpkg install sdl2:x64-windows

      - name: Configure CMake
        run: |
          cmake -B emulator/build `
            -S emulator `
            -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake `
            -DVCPKG_TARGET_TRIPLET=x64-windows

      - name: Build Release
        run: |
          cmake --build emulator/build --config Release

      - name: Prepare Release Notes
        shell: powershell
        run: |
          if (!(Test-Path ".github/releases/${{ github.ref_name }}.md")) {
            "Release ${{ github.ref_name }}" | Out-File release-notes.md
          }
          else {
            Copy-Item ".github/releases/${{ github.ref_name }}.md" release-notes.md
          }

      - name: Package Release
        run: |
          mkdir release

          copy emulator\build\Release\emulator.exe release\
          copy C:\vcpkg\installed\x64-windows\bin\SDL2.dll release\

          copy .github\release_assets\README.md release\

          Compress-Archive `
            -Path release\* `
            -DestinationPath VexelEmulator-${{ github.ref_name }}-windows-x64.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          generate_release_notes: true
          files: |
            VexelEmulator-${{ github.ref_name }}-windows-x64.zip
